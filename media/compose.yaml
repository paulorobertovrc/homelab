# Servarr media stack — WSL2 (Ubuntu 26.04) homelab
# ---------------------------------------------------------------------------
# Storage layout (WSL-specific, see README.md):
#   - Downloads  -> ext4 virtual disk  (${DOWNLOADS})  : fast, absorbs torrent churn
#   - Library    -> F:\Media           (${LIBRARY})    : big; Plex on Windows reads it natively
#   - Configs/DB -> ext4 /docker/appdata(${CONFIG_ROOT}): SQLite is slow/unsafe on 9p
# Downloads live on ext4 while active; Radarr/Sonarr move+rename into F:\Media on import.
# qbittorrent + prowlarr ride inside gluetun's netns (kill-switch); radarr/sonarr/bazarr
# sit on servarr_network and reach them through gluetun's firewall (FIREWALL_OUTBOUND_SUBNETS).
# ---------------------------------------------------------------------------

x-common-keys: &common-keys
  restart: unless-stopped
  environment:
    PUID: ${PUID:-1000}
    PGID: ${PGID:-1000}
    TZ: ${TZ:-America/Cuiaba}

networks:
  servarr_network:
    name: servarr_network
    ipam:
      config:
        - subnet: ${SERVARR_SUBNET:-172.31.0.0/24}

services:
  ###############################################
  # GLUETUN — VPN gateway (kill-switch)
  ###############################################
  gluetun:
    image: qmcgaw/gluetun:v3.41
    container_name: gluetun
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    networks:
      servarr_network:
        ipv4_address: ${SET_IP_GLUETUN:-172.31.0.2}
    ports:
      - ${QBIT_WEBUI_PORT:-8090}:8080   # qbittorrent WebUI (host 8090; 8080 is taken on the Windows host)
      - 6881:6881       # qbittorrent torrent (tcp)
      - 6881:6881/udp   # qbittorrent torrent (udp)
      - 9696:9696       # prowlarr
    volumes:
      - ${CONFIG_ROOT:-/docker/appdata}/gluetun:/gluetun
    environment:
      - VPN_SERVICE_PROVIDER=${VPN_SERVICE_PROVIDER:-mullvad}
      - VPN_TYPE=${VPN_TYPE:-wireguard}
      # OpenVPN alternative (leave commented for WireGuard):
      #- OPENVPN_USER=${OPENVPN_USER}
      #- OPENVPN_PASSWORD=${OPENVPN_PASSWORD}
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY:?Set WIREGUARD_PRIVATE_KEY in media/.env}
      # WIREGUARD_ADDRESSES: required for Mullvad; NordVPN sets it automatically — leave unset on NordVPN.
      - WIREGUARD_ADDRESSES=${WIREGUARD_ADDRESSES:-}
      - SERVER_COUNTRIES=${SERVER_COUNTRIES:-Brazil}
      # Let LAN containers (radarr/sonarr/bazarr) reach prowlarr/qbit through the VPN firewall:
      - FIREWALL_OUTBOUND_SUBNETS=${SERVARR_SUBNET:-172.31.0.0/24}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- https://ipinfo.io/ip || exit 1"]
      interval: ${HEALTH_VPN_DURATION_INITIAL:-30s}
      timeout: 20s
      retries: 5
    labels:
      - autoheal=true   # autoheal restarts gluetun if the VPN goes unhealthy

  ###############################################
  # QBITTORRENT — downloader (behind VPN)
  ###############################################
  qbittorrent:
    <<: *common-keys
    image: ghcr.io/hotio/qbittorrent:release
    container_name: qbittorrent
    network_mode: service:gluetun
    # Guards against the 2026-07-22 boot race: on a daemon-driven restart (host
    # reboot, dockerd restart, `docker restart` outside `docker compose up`),
    # Docker restarts each container per its own `restart:` policy and ignores
    # `depends_on: condition: service_healthy` entirely — that gate is a
    # compose-CLI construct, not enforced by the Engine. If qBittorrent's
    # process starts before gluetun's tun0 has an address, it silently
    # discards `Session\Interface=tun0` and falls back to binding `0.0.0.0`
    # (eth0), defeating the kill-switch at the bind level. See README.md
    # "qBittorrent MUST be bound to tun0".
    entrypoint:
      - /bin/bash
      - -c
      - |
        trap 'exit 0' TERM INT
        until ip -4 addr show tun0 2>/dev/null | grep -q inet; do
          echo "[tun0-wait] tun0 sem IPv4; aguardando VPN..."
          sleep 2
        done
        echo "[tun0-wait] tun0 pronto; iniciando qBittorrent."
        exec /init
    depends_on:
      gluetun:
        condition: service_healthy
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-America/Cuiaba}
      WEBUI_PORTS: 8080/tcp
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${CONFIG_ROOT:-/docker/appdata}/qbittorrent:/config
      - ${DOWNLOADS:-/data/torrents}:/data/torrents
    # If gluetun restarts, this loses connectivity -> unhealthy -> autoheal restarts it.
    # The ss check catches the OTHER failure mode: qBittorrent bound to 0.0.0.0/eth0
    # instead of tun0 (see the entrypoint comment above and README.md "qBittorrent
    # MUST be bound to tun0"). `%tun0` in `ss` output only appears for a socket
    # actually bound to that device by name, so it's immune to tun0 getting a new
    # IP on VPN redial. A bad bind -> unhealthy -> autoheal recycles the container
    # -> re-enters the entrypoint's wait-for-tun0 loop on the next boot.
    healthcheck:
      test: ["CMD-SHELL", "ss -tln | grep -q '%tun0:' && curl -sf -m 10 https://www.google.com -o /dev/null || exit 1"]
      interval: 60s
      timeout: 15s
      retries: 4
      start_period: 120s
    labels:
      - autoheal=true

  ###############################################
  # PROWLARR — indexer manager (behind VPN)
  ###############################################
  prowlarr:
    <<: *common-keys
    image: ghcr.io/hotio/prowlarr:release
    container_name: prowlarr
    network_mode: service:gluetun
    depends_on:
      gluetun:
        condition: service_healthy
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${CONFIG_ROOT:-/docker/appdata}/prowlarr:/config
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -m 10 https://www.google.com -o /dev/null || exit 1"]
      interval: 60s
      timeout: 15s
      retries: 4
      start_period: 120s
    labels:
      - autoheal=true

  ###############################################
  # RADARR — movies
  ###############################################
  radarr:
    <<: *common-keys
    image: ghcr.io/hotio/radarr:release
    container_name: radarr
    networks:
      servarr_network:
        ipv4_address: ${SET_IP_RADARR:-172.31.0.11}
    ports:
      - 7878:7878
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${CONFIG_ROOT:-/docker/appdata}/radarr:/config
      - ${DOWNLOADS:-/data/torrents}:/data/torrents   # ext4 (read from downloads)
      - ${LIBRARY:-/mnt/f/Media}:/data/media          # F: (write library -> /data/media/Movies)

  ###############################################
  # SONARR — TV shows
  ###############################################
  sonarr:
    <<: *common-keys
    image: ghcr.io/hotio/sonarr:release
    container_name: sonarr
    networks:
      servarr_network:
        ipv4_address: ${SET_IP_SONARR:-172.31.0.12}
    ports:
      - 8989:8989
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${CONFIG_ROOT:-/docker/appdata}/sonarr:/config
      - ${DOWNLOADS:-/data/torrents}:/data/torrents   # ext4 (read from downloads)
      - ${LIBRARY:-/mnt/f/Media}:/data/media          # F: (write library -> "/data/media/TV Shows")

  ###############################################
  # FLARESOLVERR — Cloudflare-bypass proxy for Prowlarr indexers
  # (needed by 1337x, EZTV; not by YTS/TPB/LimeTorrents)
  # Shares gluetun's netns (network_mode: service:gluetun) so its egress IP
  # matches Prowlarr's (also on gluetun) — Cloudflare ties its clearance
  # cookie to the solving IP, so solver and requester must share one.
  ###############################################
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    restart: unless-stopped
    network_mode: service:gluetun
    depends_on:
      gluetun:
        condition: service_healthy
    environment:
      - TZ=${TZ:-America/Cuiaba}
      - LOG_LEVEL=info

  ###############################################
  # BAZARR — subtitles (reads the library only)
  ###############################################
  bazarr:
    <<: *common-keys
    image: ghcr.io/hotio/bazarr:release
    container_name: bazarr
    networks:
      servarr_network:
        ipv4_address: ${SET_IP_BAZARR:-172.31.0.13}
    ports:
      - 6767:6767
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${CONFIG_ROOT:-/docker/appdata}/bazarr:/config
      - ${LIBRARY:-/mnt/f/Media}:/data/media

  ###############################################
  # AUTOHEAL — restarts any container labeled autoheal=true when it goes unhealthy
  ###############################################
  autoheal:
    image: willfarrell/autoheal:latest
    container_name: autoheal
    restart: unless-stopped
    environment:
      - AUTOHEAL_CONTAINER_LABEL=autoheal
      - AUTOHEAL_INTERVAL=30
      - AUTOHEAL_START_PERIOD=120
      - TZ=${TZ:-America/Cuiaba}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  ###############################################
  # RECYCLARR — keeps TRaSH custom formats / quality profiles in sync (daily)
  ###############################################
  recyclarr:
    image: ghcr.io/recyclarr/recyclarr:latest
    container_name: recyclarr
    restart: unless-stopped
    user: "${PUID:-1000}:${PGID:-1000}"
    networks:
      servarr_network:
        ipv4_address: ${SET_IP_RECYCLARR:-172.39.0.14}
    environment:
      - TZ=${TZ:-America/Cuiaba}
      - CRON_SCHEDULE=@daily
      - RECYCLARR_CREATE_CONFIG=false
    volumes:
      - ${CONFIG_ROOT:-/docker/appdata}/recyclarr:/config

  ###############################################
  # NTFY — self-hosted push notifications (Radarr/Sonarr/Prowlarr -> your phone)
  ###############################################
  ntfy:
    image: binwiederhier/ntfy:latest
    container_name: ntfy
    command: serve
    restart: unless-stopped
    networks:
      servarr_network:
        ipv4_address: ${SET_IP_NTFY:-172.39.0.10}
    ports:
      - 8095:80
    environment:
      - TZ=${TZ:-America/Cuiaba}
      - NTFY_BASE_URL=http://${LAN_IP:-localhost}:8095
      - NTFY_CACHE_FILE=/var/cache/ntfy/cache.db
      - NTFY_AUTH_FILE=/var/cache/ntfy/auth.db
      - NTFY_ATTACHMENT_CACHE_DIR=/var/cache/ntfy/attachments
    volumes:
      - ${CONFIG_ROOT:-/docker/appdata}/ntfy:/var/cache/ntfy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:80/v1/health 2>/dev/null | grep -q healthy || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3

  ###############################################
  # TAILSCALE-NTFY — official Tailscale client (separate from the host's
  # Headscale-connected tailscaled) whose only job is `tailscale serve`:
  # gives ntfy a real HTTPS URL (*.ts.net, auto Let's Encrypt) for the
  # browser Notifications API, which requires a secure context.
  # Runs in its own container network namespace -> cannot touch the host's
  # Headscale routing tables. Joins servarr_network to reach ntfy by name.
  ###############################################
  tailscale-ntfy:
    image: tailscale/tailscale:latest
    container_name: tailscale-ntfy
    # No `hostname:` here on purpose: it would shadow Docker's DNS resolution
    # of the real "ntfy" service (self-collision -> proxies to itself).
    # TS_HOSTNAME below controls the Tailscale-visible node name instead.
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    networks:
      servarr_network:
        ipv4_address: ${SET_IP_TS_NTFY:-172.39.0.16}
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_HOSTNAME=ntfy
      - TS_AUTHKEY=${TS_AUTHKEY:?Set TS_AUTHKEY in media/.env (generate at login.tailscale.com/admin/settings/keys)}
    volumes:
      - ${CONFIG_ROOT:-/docker/appdata}/tailscale-ntfy:/var/lib/tailscale

  ###############################################
  # ADDARR — Telegram bot: DM a title -> adds + searches in Sonarr/Radarr
  # Talks only to Sonarr/Radarr APIs; doesn't touch files, doesn't ride gluetun.
  # Secrets (bot token, allowlist, password) live in ${CONFIG_ROOT}/addarr (not in git).
  ###############################################
  addarr:
    image: waterboy1602/addarr:latest
    container_name: addarr
    restart: unless-stopped
    networks:
      servarr_network:
        ipv4_address: ${SET_IP_ADDARR:-172.31.0.15}
    environment:
      - TZ=${TZ:-America/Cuiaba}
    volumes:
      - ${CONFIG_ROOT:-/docker/appdata}/addarr/config.yaml:/app/config.yaml:ro
      - ${CONFIG_ROOT:-/docker/appdata}/addarr/chatid.txt:/app/chatid.txt
      - ${CONFIG_ROOT:-/docker/appdata}/addarr/allowlist.txt:/app/allowlist.txt:ro
      - ${CONFIG_ROOT:-/docker/appdata}/addarr/admin.txt:/app/admin.txt:ro
      - ${CONFIG_ROOT:-/docker/appdata}/addarr/logs:/app/logs

  ###############################################
  # IMPORT-GATE — post-import audio-language + integrity gate
  # Webhook from Sonarr/Radarr on import -> ffprobe integrity + faster-whisper
  # (CPU) language check. On failure: quarantine (outside library) + blocklist
  # + re-search, with a 3-attempt loop guard. Library mounted read-only.
  ###############################################
  import-gate:
    build: ./import-gate
    container_name: import-gate
    restart: unless-stopped
    user: "${PUID:-1000}:${PGID:-1000}"
    networks:
      servarr_network:
        ipv4_address: ${SET_IP_IMPORT_GATE:-172.31.0.17}
    environment:
      - TZ=${TZ:-America/Cuiaba}
      - RADARR_URL=http://${SET_IP_RADARR:-172.31.0.11}:7878
      - SONARR_URL=http://${SET_IP_SONARR:-172.31.0.12}:8989
      - RADARR_API_KEY=${RADARR_API_KEY:?Set RADARR_API_KEY in media/.env}
      - SONARR_API_KEY=${SONARR_API_KEY:?Set SONARR_API_KEY in media/.env}
      - NTFY_URL=http://${SET_IP_NTFY:-172.39.0.10}:80/arr-media
      - HF_HOME=/config/hf-cache
    volumes:
      - ${LIBRARY:-/mnt/f/Media}:/data/media:ro
      - /mnt/d/quarantine/arr_server:/data/quarantine
      - ${CONFIG_ROOT:-/docker/appdata}/import-gate:/config
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\" || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  ###############################################
  # JELLYSEERR — portal de descoberta e requests (fork do Overseerr)
  # Discover TMDB + watchlist Plex + botão "pedir" -> Sonarr/Radarr.
  # Egress normal (TMDB/plex.tv/host Plex) — não ride no gluetun, como radarr/sonarr.
  # API key (Settings -> General) é consumida pelo suggest-bot.
  ###############################################
  jellyseerr:
    image: fallenbagel/jellyseerr:latest
    container_name: jellyseerr
    restart: unless-stopped
    networks:
      servarr_network:
        ipv4_address: ${SET_IP_JELLYSEERR:-172.31.0.18}
    ports:
      - 5055:5055
    environment:
      - TZ=${TZ:-America/Cuiaba}
      - LOG_LEVEL=info
    volumes:
      - ${CONFIG_ROOT:-/docker/appdata}/jellyseerr:/app/config
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:5055/api/v1/status || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s

  ###############################################
  # HOMEPAGE — single dashboard for the whole stack
  # Widgets pull each app's API (live counts/queues/speeds); container status via docker socket (ro).
  # Config lives in ${CONFIG_ROOT}/homepage (not in git — holds API keys).
  ###############################################
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped
    networks:
      servarr_network:
        ipv4_address: ${SET_IP_HOMEPAGE:-172.39.0.20}
    ports:
      - 7575:3000   # host 7575 (3000 is taken by another project); container listens on 3000
    environment:
      - TZ=${TZ:-America/Cuiaba}
      # Homepage refuses requests whose Host header isn't listed (CSRF guard). Set in media/.env.
      - HOMEPAGE_ALLOWED_HOSTS=${HOMEPAGE_ALLOWED_HOSTS:-localhost:7575,localhost:3000}
    volumes:
      - ${CONFIG_ROOT:-/docker/appdata}/homepage:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro   # read-only: container status only
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:3000/ || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
